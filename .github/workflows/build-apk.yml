name: 构建 APK

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  # 允许手动触发
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置 Flutter 环境
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: 3.41.9
          cache: true

      - name: 查看 Flutter 版本
        run: flutter --version

      - name: 安装依赖
        run: flutter pub get

      - name: 代码分析
        run: flutter analyze

      - name: 运行测试
        run: flutter test

      - name: 构建 Debug APK
        run: flutter build apk --debug

      - name: 上传 APK 到构建产物
        uses: actions/upload-artifact@v4
        with:
          name: AppSort-Debug-APK
          path: build/app/outputs/flutter-apk/app-debug.apk
          if-no-files-found: error
          retention-days: 7

      - name: 获取 APK 大小
        run: ls -lh build/app/outputs/flutter-apk/
