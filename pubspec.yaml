name: appsort
description: "AI 智能应用分类启动器 - 使用 AI 自动整理手机应用"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.5

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # 状态管理
  flutter_riverpod: ^2.6.1

  # 本地数据库
  sqflite: ^2.4.1
  path_provider: ^2.1.5

  # 设置存储
  shared_preferences: ^2.3.5

  # HTTP 客户端（AI API 调用）
  dio: ^5.7.0

  # 工具类
  path: ^1.9.0
  equatable: ^2.0.7

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
